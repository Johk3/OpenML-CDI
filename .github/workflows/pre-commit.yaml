name: lefthook

on:
  workflow_call:
jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Pyright
        run: pnpm add -g pyright

      - name: Install Python Linters
        run: pip install black flake8

      - name: Install Frontend Dependencies
        # Required because ESLint relies on local plugins inside node_modules
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Install Lefthook
        run: pnpm add -g @evilmartians/lefthook

      - name: Run all hooks
        # --all-files forces Lefthook to check the entire repository, not just staged files
        run: lefthook run pre-commit --all-files
