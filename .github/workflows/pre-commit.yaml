name: lefthook

on:
  workflow_call: 
jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Frontend Dependencies
        # Required because ESLint relies on local plugins inside node_modules
        working-directory: ./frontend
        run: npm ci # Or 'npm install' if we do not use package-lock.json

      - name: Install Lefthook
        run: npm install -g @evilmartians/lefthook

      - name: Run all hooks
        # --all-files forces Lefthook to check the entire repository, not just staged files
        run: lefthook run pre-commit --all-files
